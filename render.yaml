services:
  - type: web
    name: hall-sync-backend
    env: node
    region: singapore
    # Keep free for preview only. Select an always-on paid plan before a live
    # pilot so health checks and scheduled operations are reliable.
    plan: free
    buildCommand: npm ci && npm run build
    startCommand: npm start
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: API_PREFIX
        value: /api
      - key: DB_HOST
        sync: false
      - key: DB_PORT
        sync: false
      - key: DB_USER
        sync: false
      - key: DB_PASSWORD
        sync: false
      - key: DB_NAME
        sync: false
      - key: DB_SSL
        value: "true"
      - key: DB_SSL_CA_PATH
        sync: false
      - key: DB_CONNECTION_LIMIT
        value: "10"
      - key: DB_QUEUE_LIMIT
        value: "0"
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 8h
      - key: BCRYPT_ROUNDS
        value: "10"
      - key: TRUST_PROXY_HOPS
        value: "1"
      - key: CORS_ORIGIN
        sync: false
      - key: FRONTEND_URL
        sync: false
      - key: LOG_LEVEL
        value: info
      - key: SMTP_ENABLED
        value: "false"
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: SMTP_FROM
        sync: false
      - key: SMTP_SECURE
        value: "false"
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      - key: UPI_ID
        sync: false
      - key: ERROR_MONITORING_DSN
        sync: false
      - key: UPTIME_MONITOR_HEALTH_URL
        sync: false
      - key: UPTIME_MONITOR_FRONTEND_URL
        sync: false
      - key: OPS_ALERT_RECIPIENT
        sync: false
      - key: BACKUP_RETENTION_DAYS
        value: "30"
      - key: BACKUP_RETENTION_MIN_COUNT
        value: "7"
      - key: BACKUP_RETENTION_APPLY
        value: "false"
      - key: SUBSCRIPTION_GRACE_DAYS
        value: "7"
      - key: SUBSCRIPTION_MAINTENANCE_APPLY
        value: "false"
      - key: SUBSCRIPTION_REMINDERS_SEND
        value: "false"
